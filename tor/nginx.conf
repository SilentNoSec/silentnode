server {
    listen 127.0.0.1:8080;
    server_name _;

    root /var/www/silentnode/public;
    index index.html;

    access_log off;
    error_log /dev/null;

    server_tokens off;
    more_clear_headers Server;

    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=(), interest-cohort=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    add_header Onion-Location "http://ONION_ADDRESS_HERE.onion$request_uri" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
